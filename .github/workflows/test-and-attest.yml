# Runs tests on main/master and updates docs/TEST_ATTESTATION.md when green.
name: test-and-attest

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: test-and-attest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Update test attestation
        if: success()
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/ci/update-test-attestation.mjs

      - name: Commit attestation
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): update TEST_ATTESTATION.md [skip ci]"
          file_pattern: docs/TEST_ATTESTATION.md
