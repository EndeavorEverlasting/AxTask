services:
  - type: web
    name: axtask-prod
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    # npm run start runs scripts/production-start.mjs: migrations → drizzle push → dist/index.js
    startCommand: npm run start
    healthCheckPath: /ready
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FORCE_HTTPS
        value: "true"
      # Set CANONICAL_HOST to your primary domain (for unknown host redirects).
      # Keep REPLIT_FALLBACK_HOST set so rollback is instant.
      - key: CANONICAL_HOST
        sync: false
      - key: REPLIT_FALLBACK_HOST
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SHEETS_API_KEY
        sync: false
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_REDIRECT_URI
        sync: false
      - key: AUTH_PROVIDER
        sync: false

  # Nightly retention sweep. Uncomment to activate; requires a Render cron
  # service (paid add-on) and the same DATABASE_URL secret as axtask-prod.
  # See docs/DB_RETENTION_POLICY.md for the windows this runs against.
  # - type: cron
  #   name: axtask-db-retention
  #   env: node
  #   plan: starter
  #   schedule: "15 4 * * *"  # 04:15 UTC daily
  #   buildCommand: npm ci
  #   startCommand: node scripts/db-retention.mjs
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: DATABASE_URL
  #       sync: false
