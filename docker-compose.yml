version: "3.9"

services:
  database:
    image: postgres:16-alpine
    container_name: axtask-db
    environment:
      POSTGRES_DB: axtask
      POSTGRES_USER: axtask
      POSTGRES_PASSWORD: axtask
    ports:
      - "5432:5432"
    volumes:
      - axtask_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axtask -d axtask"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      target: runtime
    container_name: axtask-app
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://axtask:axtask@database:5432/axtask
      SESSION_SECRET: change-me-in-production-min-32-chars
      CANONICAL_HOST: localhost
      FORCE_HTTPS: "false"
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

volumes:
  axtask_postgres_data:
