services:
  database:
    image: postgres:16-alpine
    container_name: axtask-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axtask}
      POSTGRES_USER: ${POSTGRES_USER:-axtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axtask}
    ports:
      - "5432:5432"
    volumes:
      - axtask_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axtask} -d ${POSTGRES_DB:-axtask}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: runtime
    container_name: axtask-migrate
    env_file:
      - .env.docker
    depends_on:
      database:
        condition: service_healthy
    command: ["sh", "-c", "node scripts/apply-migrations.mjs && npm run db:push </dev/null"]
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: axtask-app
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      AXTASK_ALARM_COMPANION_URL: ${AXTASK_ALARM_COMPANION_URL:-}
    ports:
      - "5000:5000"
    volumes:
      - axtask_storage_data:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

volumes:
  axtask_postgres_data:
  axtask_storage_data:
